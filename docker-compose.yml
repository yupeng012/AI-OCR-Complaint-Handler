version: '3.8'

services:
  ai-complaint-handler:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./tickets.json:/app/tickets.json
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_ENABLE_CORS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "com.ai-complaint.description=AI Complaint Handler Pro"
      - "com.ai-complaint.version=2.0"
